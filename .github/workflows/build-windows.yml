# 如需重新啟用請移除 branches 下的空陣列。
name: 音量平衡（舊版）

on:
  workflow_dispatch:  # 保留手動觸發以備不時之需

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter==5.2.2 pydub==0.25.1 pyloudnorm==0.2.0 numpy sounddevice soundfile Pillow pyinstaller scipy

      - name: Download ffmpeg
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpegDir = Get-ChildItem -Path ffmpeg_extracted -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" -Destination .
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" -Destination .
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean `
            --windowed `
            --name "Audio Balancer" `
            --collect-all customtkinter `
            --collect-all pyloudnorm `
            --collect-all scipy `
            --hidden-import pydub `
            --hidden-import sounddevice `
            --hidden-import soundfile `
            --hidden-import importlib.resources `
            --hidden-import importlib.metadata `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            audio_balancer.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audio-Balancer-Windows
          path: dist/Audio Balancer/
          retention-days: 30
